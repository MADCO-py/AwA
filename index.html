<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="theme-color" content="#080c14"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="AwA"/>
<link rel="manifest" href="manifest.json"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>AwA</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080c14;--blue:#3b9eff;--blue-dim:#1a5fa8;--text-dim:rgba(255,255,255,0.35);--text-mid:rgba(255,255,255,0.65);}
html,body{width:100%;height:100%;background:var(--bg);color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
  overflow:hidden;touch-action:none;}
.app-scroll{
  width:100%;height:100dvh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.app-scroll::-webkit-scrollbar{display:none;}
.screen{
  width:100%;height:100dvh;
  scroll-snap-align:start;
  position:relative;
  flex-shrink:0;
}
.stage{width:100%;height:100%;position:relative;overflow:hidden;}

/* Scroll hint arrow */
.scroll-hint{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  opacity:0.35;animation:bob 2s ease-in-out infinite;pointer-events:none;z-index:10;
}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}}
.scroll-hint svg{width:20px;height:20px;}

/* ── STATS SCREEN ── */
.stats-screen{
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:64px 20px 48px;
  gap:0;
  overflow-y:auto;
}

.stats-title{
  font-size:13px;font-weight:600;letter-spacing:.18em;
  color:rgba(255,255,255,.35);text-transform:uppercase;
  margin-bottom:36px;
}

/* Week rings grid */
.week-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  width:100%;max-width:420px;
}
.day-cell{
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.day-ring{
  position:relative;width:100%;aspect-ratio:1;
}
.day-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.day-ring .ring-bg{stroke:rgba(255,255,255,0.07);}
.day-ring .ring-fill{
  stroke-linecap:round;
  transition:stroke-dashoffset 1s cubic-bezier(0.34,1,0.64,1);
}
.day-ring .ring-fill.done{stroke:#30d158;}
.day-ring .ring-fill.partial{stroke:#0a84ff;}
.day-ring .ring-fill.empty{stroke:rgba(255,255,255,0.07);}
.day-ring .ring-label{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:clamp(8px,2.4vw,11px);font-weight:700;color:rgba(255,255,255,.75);
  text-align:center;line-height:1.1;
}
.day-ring.today .ring-label{color:#fff;}
.day-name{
  font-size:clamp(8px,2vw,11px);color:rgba(255,255,255,.3);
  letter-spacing:.06em;font-weight:500;
}
.day-cell.today .day-name{color:rgba(255,255,255,.75);}

/* Streak card */
.streak-card{
  margin-top:36px;
  width:100%;max-width:380px;
  background:rgba(255,255,255,0.05);
  border:.5px solid rgba(255,255,255,0.09);
  border-radius:20px;
  padding:22px 24px;
  display:flex;align-items:center;gap:18px;
}
.streak-icon{font-size:36px;line-height:1;}
.streak-info{}
.streak-num{font-size:36px;font-weight:700;line-height:1;color:#fff;letter-spacing:-.03em;}
.streak-label{font-size:12px;color:rgba(255,255,255,.4);margin-top:3px;letter-spacing:.06em;}

/* Best week card */
.stats-cards{
  margin-top:14px;
  width:100%;max-width:420px;
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;
}
.stat-card{
  background:rgba(255,255,255,0.04);
  border:.5px solid rgba(255,255,255,0.07);
  border-radius:16px;
  padding:16px 18px;
  display:flex;flex-direction:column;gap:6px;
}
.stat-card.wide{grid-column:1/-1;}
.stat-label{font-size:10px;color:rgba(255,255,255,.32);letter-spacing:.1em;font-weight:600;text-transform:uppercase;}
.stat-val{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.03em;line-height:1;}
.stat-sub{font-size:11px;color:rgba(255,255,255,.35);}
.peak-list{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
.peak-empty{font-size:13px;color:rgba(255,255,255,.25);padding:4px 0;}
.peak-row{display:flex;flex-direction:column;gap:5px;}
.peak-row-top{display:flex;align-items:center;justify-content:space-between;}
.peak-hour{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.01em;}
.peak-pct{font-size:12px;color:rgba(255,255,255,.45);font-weight:500;}
.peak-bar-track{height:4px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden;}
.peak-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#0a84ff,#30d158);
  transition:width 0.8s cubic-bezier(0.34,1,0.64,1);}

/* Scroll hint up on stats screen */
.scroll-up{
  position:absolute;top:20px;left:50%;transform:translateX(-50%);
  opacity:0.3;pointer-events:none;
}
.bottle-card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px;}

.slide-out-left{animation:soleft .6s cubic-bezier(.4,0,.2,1) forwards;}
.slide-in-right{animation:siright .6s cubic-bezier(.34,1.2,.64,1) forwards;}
@keyframes soleft{0%{transform:translateX(0);opacity:1}100%{transform:translateX(-115%);opacity:0}}
@keyframes siright{0%{transform:translateX(115%);opacity:0}60%{transform:translateX(4%);opacity:1}100%{transform:translateX(0);opacity:1}}

.dots{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:20;} .dots:has(.dot:only-child){display:none;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.18);transition:background .3s,transform .3s;}
.dot.active{background:var(--blue);transform:scale(1.35);}

/* Bottle wrap: canvas + SVG stacked */
.bottle-wrap{
  position:relative;
  width:min(200px,50vw);
  flex-shrink:0;
}
/* Canvas fills exact same space as SVG */
.bottle-canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  display:block;
}
.bottle-svg{
  position:relative;
  width:100%;height:auto;
  display:block;
  pointer-events:none;
  /* glow applied here, but canvas clips inside so no leak */
  transition:filter .8s ease;
}
.bottle-svg.glowing{animation:gpulse 2s ease-in-out infinite;}
@keyframes gpulse{
  0%,100%{filter:drop-shadow(0 0 0px transparent)}
  50%{filter:drop-shadow(0 0 32px rgba(59,158,255,.7)) drop-shadow(0 0 80px rgba(59,158,255,.3))}
}

.counter{margin-top:20px;text-align:center;position:relative;z-index:2;}
.wave-full{
  position:fixed;
  bottom:0;left:0;
  width:100vw;height:60vh;
  pointer-events:none;
  z-index:1;
  opacity:0;
}

.lnum{font-size:clamp(48px,11vw,62px);font-weight:700;letter-spacing:-.04em;line-height:1;color:#fff;}
.lunit{font-size:clamp(18px,4.5vw,24px);font-weight:300;color:var(--text-dim);}
.mlrow{margin-top:5px;font-size:clamp(11px,2.8vw,13px);color:var(--text-dim);letter-spacing:.13em;}
.blabel{margin-top:3px;font-size:11px;color:rgba(255,255,255,.18);letter-spacing:.18em;text-transform:uppercase;}
.ptrack{margin-top:14px;width:min(200px,50vw);height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--blue-dim),var(--blue));border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1);width:0%;}
.btn-row{margin-top:28px;display:flex;gap:14px;align-items:center;justify-content:center;}
.btn-lg{
  min-width:148px;height:50px;padding:0 32px;
  border-radius:100px;cursor:pointer;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:17px;font-weight:500;
  display:inline-flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  transition:transform .12s,filter .12s,opacity .12s;
  white-space:nowrap;position:relative;overflow:hidden;
}
.btn-lg:active{transform:scale(.94);opacity:.82;}
.btn-lg:disabled{opacity:.28;pointer-events:none;}
.btn-plus{background:#0a84ff;color:#fff;border:none;box-shadow:0 4px 20px rgba(10,132,255,.45);}
.btn-plus:hover{filter:brightness(1.09);}
.btn-minus{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.32);}
.btn-minus:hover{background:rgba(255,255,255,.06);}
.btn-lg-label{font-size:17px;font-weight:500;pointer-events:none;}

.toast{position:fixed;bottom:46px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(13,20,36,.9);border:.5px solid rgba(59,158,255,.22);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:rgba(255,255,255,.85);font-size:13px;letter-spacing:.06em;padding:10px 24px;border-radius:100px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;z-index:50;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.complete-bar{position:fixed;top:0;left:0;right:0;text-align:center;padding:14px;font-size:10px;letter-spacing:.2em;color:var(--blue);opacity:0;transition:opacity .8s;pointer-events:none;z-index:30;}
.complete-bar.show{opacity:1;}
</style>
</head>
<body>
<div id="nfc-screen-flash"></div>
<div class="app-scroll" id="appScroll">
  <!-- Screen 1: Bottle -->
  <div class="screen" id="screen-bottle">
    <div class="stage" id="stage"></div>
    <div class="scroll-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
  </div>
  <!-- Screen 2: Stats -->
  <div class="screen stats-screen" id="screen-stats">
    <svg class="scroll-up" viewBox="0 0 24 24" width="20" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round">
      <polyline points="6 15 12 9 18 15"/>
    </svg>
    <div class="stats-title">Esta semana</div>
    <div class="week-grid" id="weekGrid"></div>
    <div class="streak-card">
      <div class="streak-icon">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="#0a84ff" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C12 2 5 10.5 5 15a7 7 0 0 0 14 0C19 10.5 12 2 12 2z"/>
        </svg>
      </div>
      <div class="streak-info">
        <div class="streak-num" id="streakNum">0</div>
        <div class="streak-label">DÍAS CONSECUTIVOS</div>
      </div>
    </div>
    <div class="stats-cards">
      <div class="stat-card">
        <div class="stat-label">Promedio 7 días</div>
        <div class="stat-val" id="avgWeek">—</div>
        <div class="stat-sub">litros / día</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total histórico</div>
        <div class="stat-val" id="totalHist">—</div>
        <div class="stat-sub">litros acumulados</div>
      </div>
      <div class="stat-card wide">
        <div class="stat-label">Esta semana</div>
        <div class="stat-val" id="weekPct">—</div>
        <div class="stat-sub">días completados de 7</div>
      </div>
      <div class="stat-card wide" id="peakHoursCard">
        <div class="stat-label">Horas pico</div>
        <div class="peak-list" id="peakList">
          <div class="peak-empty">Aún sin datos</div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="dots" id="dots"></div>

<div class="toast" id="toast"></div>
<div class="complete-bar" id="completeBar">BOTELLA COMPLETA</div>

<script>
/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const ML_PER_DRINK = 50;
const BOTTLE_GOAL  = 2000;
const MAX_BOTTLES  = 3;

/* ════════════════════════════════════════
   BOTTLE — single source of truth
   One path used by BOTH canvas clip
   and SVG outline. ViewBox 0 0 200 480
════════════════════════════════════════ */
const VW=200, VH=480;
// Body: shoulder starts at y=76, ends at base y=446
// Round shoulder, straight sides, round base
const SHOULDER_Y = 76;
const FLOOR      = 440;
const CEIL       = SHOULDER_Y + 4;

function drawBodyPath(ctx){
  // Matches SVG path exactly
  ctx.beginPath();
  ctx.moveTo(72, SHOULDER_Y);
  ctx.bezierCurveTo(44,88, 28,114, 24,148);
  ctx.lineTo(20,184);
  ctx.bezierCurveTo(18,198,17,212,17,226);
  ctx.lineTo(17,390);
  ctx.bezierCurveTo(17,428,54,452,100,452);
  ctx.bezierCurveTo(146,452,183,428,183,390);
  ctx.lineTo(183,226);
  ctx.bezierCurveTo(183,212,182,198,180,184);
  ctx.lineTo(176,148);
  ctx.bezierCurveTo(172,114,156,88,128,SHOULDER_Y);
  ctx.closePath();
}

const BOTTLE_H = FLOOR - CEIL;

/* ════════════════════════════════════════
   WATER SIMULATION
════════════════════════════════════════ */
const sims = {};

function makeSim(uid, ml){
  if(sims[uid]?.rafId) cancelAnimationFrame(sims[uid].rafId);
  const frac = Math.min(ml/BOTTLE_GOAL,1);
  const targetY = FLOOR - frac*BOTTLE_H;
  const NODES = 28;
  const nodes = Array.from({length:NODES+1},()=>({y:targetY,vy:0}));
  sims[uid]={ml, targetY, surfaceY:targetY, nodes, bubbles:[], rafId:null};
}

function addWater(uid, ml){
  const sim=sims[uid]; if(!sim)return;
  sim.ml = Math.min(ml, BOTTLE_GOAL);
  sim.targetY = FLOOR - (sim.ml/BOTTLE_GOAL)*BOTTLE_H;
  // splash
  const K=sim.nodes.length, mid=Math.floor(K/2);
  for(let i=0;i<K;i++) sim.nodes[i].vy -= Math.max(0,7-Math.abs(i-mid))*2.2;
  // bubbles
  for(let b=0;b<5;b++){
    sim.bubbles.push({
      x:60+Math.random()*80, y:FLOOR-5-Math.random()*20,
      vy:-(0.5+Math.random()*0.7), r:1.5+Math.random()*2, life:1
    });
  }
}

function removeWater(uid, ml){
  const sim=sims[uid]; if(!sim)return;
  sim.ml = Math.max(0, ml);
  sim.targetY = FLOOR - (sim.ml/BOTTLE_GOAL)*BOTTLE_H;
}

let gx=0;

function stepSim(uid){
  const sim=sims[uid]; if(!sim)return;
  const N=sim.nodes, K=N.length;
  sim.surfaceY += (sim.targetY - sim.surfaceY)*0.04;
  const SP=0.032, DMP=0.90, SPR=0.26;
  for(let i=0;i<K;i++){
    N[i].vy = (N[i].vy + SP*(sim.surfaceY-N[i].y))*DMP;
    N[i].y += N[i].vy;
  }
  for(let it=0;it<2;it++)
    for(let i=0;i<K;i++){
      const l=i>0?N[i-1].y:N[i].y, r=i<K-1?N[i+1].y:N[i].y;
      N[i].vy += SPR*((l+r)/2-N[i].y);
    }
  // tilt
  const amp=gx*80;
  for(let i=0;i<K;i++)
    N[i].vy += (amp*(i/(K-1)-.5)-(N[i].y-sim.surfaceY))*0.055;
  // bubbles
  for(let i=sim.bubbles.length-1;i>=0;i--){
    const b=sim.bubbles[i];
    b.y+=b.vy; b.vy-=0.01; b.vy*=0.98;
    b.x+=Math.sin(b.y*.1)*.3; b.life-=0.009;
    if(b.y<sim.surfaceY-8||b.life<=0) sim.bubbles.splice(i,1);
  }
}

/* ════════════════════════════════════════
   RENDERER
════════════════════════════════════════ */
function renderSim(uid){
  const sim=sims[uid]; if(!sim)return;
  const cvs=document.getElementById('wc-'+uid); if(!cvs)return;
  const ctx=cvs.getContext('2d');
  const dW=cvs.offsetWidth||VW, dH=cvs.offsetHeight||VH;
  if(cvs.width!==dW||cvs.height!==dH){cvs.width=dW;cvs.height=dH;}
  const sx=dW/VW, sy=dH/VH;

  ctx.clearRect(0,0,dW,dH);
  ctx.save();
  ctx.scale(sx,sy);
  drawBodyPath(ctx); ctx.clip();

  // Dark interior
  ctx.fillStyle='#07101c'; ctx.fillRect(0,0,VW,VH);

  if(sim.ml>0){
    const N=sim.nodes, K=N.length;

    // Water polygon
    ctx.beginPath();
    ctx.moveTo(17,FLOOR+12);
    ctx.bezierCurveTo(17,452,54,462,100,462);
    ctx.bezierCurveTo(146,462,183,452,183,FLOOR+12);
    ctx.lineTo(183,N[K-1].y);
    for(let i=K-1;i>=0;i--) ctx.lineTo(17+(i/(K-1))*166, N[i].y);
    ctx.lineTo(17,N[0].y);
    ctx.closePath();

    const wg=ctx.createLinearGradient(0,sim.surfaceY,0,FLOOR);
    wg.addColorStop(0,  'rgba(95,210,255,0.62)');
    wg.addColorStop(0.2,'rgba(48,172,245,0.70)');
    wg.addColorStop(0.6,'rgba(18,128,218,0.76)');
    wg.addColorStop(1,  'rgba(8,72,165,0.82)');
    ctx.fillStyle=wg; ctx.fill();

    // Surface shimmer
    ctx.beginPath();
    for(let i=0;i<K;i++){
      const x=17+(i/(K-1))*166;
      i===0?ctx.moveTo(x,N[i].y):ctx.lineTo(x,N[i].y);
    }
    ctx.strokeStyle='rgba(180,235,255,0.5)'; ctx.lineWidth=1.4; ctx.stroke();

    // Top highlight
    ctx.beginPath();
    ctx.moveTo(17,FLOOR+12);
    ctx.bezierCurveTo(17,452,54,462,100,462);
    ctx.bezierCurveTo(146,462,183,452,183,FLOOR+12);
    ctx.lineTo(183,N[K-1].y);
    for(let i=K-1;i>=0;i--) ctx.lineTo(17+(i/(K-1))*166,N[i].y);
    ctx.lineTo(17,N[0].y); ctx.closePath();
    const hg=ctx.createLinearGradient(0,sim.surfaceY,0,sim.surfaceY+36);
    hg.addColorStop(0,'rgba(180,240,255,0.28)');
    hg.addColorStop(1,'rgba(180,240,255,0)');
    ctx.fillStyle=hg; ctx.fill();

    // Side light
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.fillRect(17,sim.surfaceY,12,FLOOR-sim.surfaceY);

    // Bubbles
    for(const b of sim.bubbles){
      if(b.y<sim.surfaceY) continue;
      ctx.globalAlpha=b.life*0.6;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.strokeStyle='rgba(180,235,255,0.85)'; ctx.lineWidth=0.7; ctx.stroke();
      ctx.beginPath(); ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.22,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function startRaf(uid){
  const sim=sims[uid]; if(!sim)return;
  function frame(){stepSim(uid);renderSim(uid);sim.rafId=requestAnimationFrame(frame);}
  if(sim.rafId) cancelAnimationFrame(sim.rafId);
  sim.rafId=requestAnimationFrame(frame);
}

/* ════════════════════════════════════════
   SVG SHELL — same path as canvas
════════════════════════════════════════ */
function makeBottleSVG(uid){
  return `
<canvas class="bottle-canvas" id="wc-${uid}"></canvas>
<svg class="bottle-svg" id="svg-${uid}" viewBox="0 0 ${VW} ${VH}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shL-${uid}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="shR-${uid}" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="bc-${uid}">
      <path d="M72,76 C44,88 28,114 24,148 L20,184 C18,198 17,212 17,226 L17,390 C17,428 54,452 100,452 C146,452 183,428 183,390 L183,226 C183,212 182,198 180,184 L176,148 C172,114 156,88 128,76 Z"/>
    </clipPath>
    <radialGradient id="bglow-${uid}" cx="50%" cy="88%" r="52%">
      <stop offset="0%" stop-color="rgba(59,200,255,0)" id="bgi-${uid}"/>
      <stop offset="100%" stop-color="rgba(59,200,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Base glow -->
  <ellipse id="base-glow-${uid}" cx="100" cy="446" rx="72" ry="20"
    fill="url(#bglow-${uid})" opacity="0" style="transition:opacity 0.8s"/>

  <!-- Body outline -->

/* ════════════════════════════════════════
   DEVICE MOTION
════════════════════════════════════════ */
function initTilt(){
  function onMotion(e){
    const a=e.accelerationIncludingGravity; if(!a||a.x==null)return;
    gx=Math.max(-1.5,Math.min(1.5, a.x/5));
  }
  if(window.DeviceMotionEvent){
    if(typeof DeviceMotionEvent.requestPermission==='function'){
      document.addEventListener('click',function ask(){
        DeviceMotionEvent.requestPermission().then(r=>{if(r==='granted')window.addEventListener('devicemotion',onMotion);}).catch(()=>{});
        document.removeEventListener('click',ask);
      },{once:true});
    } else { window.addEventListener('devicemotion',onMotion); }
  }
  window.addEventListener('mousemove',e=>{
    gx=((e.clientX-window.innerWidth/2)/(window.innerWidth/2));
  });
}

/* ════════════════════════════════════════
   WAVE SWEEP (fullscreen)
════════════════════════════════════════ */
function triggerNumWave(uid){
  const cvs=document.getElementById('wave-'+uid); if(!cvs)return;
  const VPW=window.innerWidth, VPH=window.innerHeight;
  cvs.width=VPW; cvs.height=VPH;
  cvs.style.width=VPW+'px'; cvs.style.height=VPH+'px';

  const lnum=document.getElementById('lnum-'+uid);
  const rect=lnum?lnum.getBoundingClientRect():null;
  const numBottom=(rect?rect.bottom:VPH*0.65)+20;

  const ctx=cvs.getContext('2d');
  cvs.style.opacity='1';

  // Wave enters from left side, the ENTIRE canvas width from the start
  // Phase 1 (RISE): wave rises from bottom to numBottom
  // Phase 2 (HOLD): stays
  // Phase 3 (FALL): sinks back down and fades
  const RISE=70, HOLD=50, FALL=55, total=RISE+HOLD+FALL;
  let t=0;

  function surfY(x, riseP, tm){
    // Base height: at riseP=0 wave is at bottom, at riseP=1 at numBottom
    const base = VPH - (VPH - numBottom) * riseP;
    // Big slow wave from left to right
    const wave1 = Math.sin(x/VPW*Math.PI*1.8 - tm*1.2) * 28 * riseP;
    const wave2 = Math.sin(x/VPW*Math.PI*3.5 - tm*2.1) * 12 * riseP;
    const wave3 = Math.sin(x/VPW*Math.PI*0.8 - tm*0.6) * 18 * riseP;
    return base - wave1 - wave2 - wave3;
  }

  function frame(){
    ctx.clearRect(0,0,VPW,VPH);

    const riseP  = t<RISE ? t/RISE : t<RISE+HOLD ? 1 : 1-(t-RISE-HOLD)/FALL;
    const alpha  = t<RISE ? t/RISE : t<RISE+HOLD ? 1 : 1-(t-RISE-HOLD)/FALL;
    const tm     = t * 0.08;

    // Draw full-width wave — no sweep cutoff, always full width
    ctx.beginPath();
    ctx.moveTo(0, VPH);
    ctx.lineTo(0, surfY(0, riseP, tm));
    for(let x=3; x<=VPW; x+=3){
      ctx.lineTo(x, surfY(x, riseP, tm));
    }
    ctx.lineTo(VPW, VPH);
    ctx.closePath();

    // Gradient fill
    const base = VPH - (VPH - numBottom) * riseP;
    const g = ctx.createLinearGradient(0, base-40, 0, VPH);
    g.addColorStop(0,   `rgba(80,195,255,${0.40*alpha})`);
    g.addColorStop(0.3, `rgba(45,155,240,${0.52*alpha})`);
    g.addColorStop(0.7, `rgba(18,110,210,${0.60*alpha})`);
    g.addColorStop(1,   `rgba(8,65,170,${0.65*alpha})`);
    ctx.fillStyle = g;
    ctx.fill();

    // Surface shimmer line
    ctx.beginPath();
    ctx.moveTo(0, surfY(0, riseP, tm));
    for(let x=3; x<=VPW; x+=3){
      ctx.lineTo(x, surfY(x, riseP, tm));
    }
    ctx.strokeStyle = `rgba(180,238,255,${0.65*alpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Secondary highlight wave on surface
    ctx.beginPath();
    ctx.moveTo(0, surfY(0, riseP, tm)-4);
    for(let x=3; x<=VPW; x+=3){
      ctx.lineTo(x, surfY(x, riseP, tm)-4);
    }
    ctx.strokeStyle = `rgba(220,248,255,${0.25*alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    t++;
    if(t<total) requestAnimationFrame(frame);
    else{ ctx.clearRect(0,0,VPW,VPH); cvs.style.opacity='0'; }
  }
  requestAnimationFrame(frame);
}

function todayKey(id){const d=new Date();return`awa-b${id}-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}
function getMl(id){return parseInt(localStorage.getItem(todayKey(id))||'0');}
function setMl(id,ml){localStorage.setItem(todayKey(id),Math.max(0,ml));}
function logDrinkTime(){
  const now=new Date();
  const h=now.getHours();
  const key='awa-hours';
  const hours=JSON.parse(localStorage.getItem(key)||'{}');
  hours[h]=(hours[h]||0)+1;
  localStorage.setItem(key,JSON.stringify(hours));
}
function getSaved(){return JSON.parse(localStorage.getItem('awa-bottles')||'[]');}
function saveBts(){localStorage.setItem('awa-bottles',JSON.stringify(bottles));}
let bottles=[], current=0, transitioning=false;

/* ════════════════════════════════════════
   DOTS / UI
════════════════════════════════════════ */
function renderDots(){
  const el=document.getElementById('dots');
  el.innerHTML=bottles.map((_,i)=>`<div class="dot${i===current?' active':''}"></div>`).join('');
  el.style.display=bottles.length>1?'flex':'none';
}

function renderUI(uid,ml){
  const frac=Math.min(ml/BOTTLE_GOAL,1);
  const lnum=document.getElementById('lnum-'+uid); if(!lnum)return;
  lnum.textContent=(ml/1000).toFixed(2);
  document.getElementById('mlrow-'+uid).textContent=`${ml} ML / ${BOTTLE_GOAL} ML`;
  document.getElementById('prog-'+uid).style.width=`${frac*100}%`;
  document.getElementById('undo-'+uid).disabled=ml===0;
  const svg=document.getElementById('svg-'+uid);
  const bar=document.getElementById('completeBar');
  const gi=document.getElementById('bgi-'+uid);
  const ge=document.getElementById('base-glow-'+uid);
  if(ml>=BOTTLE_GOAL){
    svg?.classList.add('glowing'); bar.classList.add('show');
    if(gi)gi.setAttribute('stop-color','rgba(59,210,255,0.55)');
    if(ge){ge.style.opacity='1';}
  } else {
    svg?.classList.remove('glowing'); bar.classList.remove('show');
    if(gi)gi.setAttribute('stop-color','rgba(59,200,255,0)');
    if(ge){ge.style.opacity='0';}
  }
}

/* ════════════════════════════════════════
   DRINK / UNDO
════════════════════════════════════════ */
function addMl(idx,amount,wave=false){
  const b=bottles[idx]; if(!b)return;
  let ml=getMl(b.id);
  if(ml>=BOTTLE_GOAL){showToast('Botella completa');return;}
  ml=Math.min(BOTTLE_GOAL,ml+amount);
  setMl(b.id,ml); renderUI(b.id,ml);
  addWater(b.id,ml);
  logDrinkTime();
  if(wave) triggerNumWave(b.id);
  if(ml>=BOTTLE_GOAL)setTimeout(()=>showToast('Meta completada'),600);
  renderStats();
}
function removeMl(idx){
  const b=bottles[idx]; if(!b)return;
  let ml=getMl(b.id); if(ml<=0)return;
  ml=Math.max(0,ml-ML_PER_DRINK);
  setMl(b.id,ml); renderUI(b.id,ml);
  removeWater(b.id,ml);
}

/* ════════════════════════════════════════
   WIRE / INIT
════════════════════════════════════════ */
function wireCard(b,idx){
  document.getElementById('undo-'+b.id)?.addEventListener('click',()=>removeMl(idx));
  document.getElementById('add50-'+b.id)?.addEventListener('click',()=>addMl(idx,ML_PER_DRINK,true));
}

function initStage(){
  const saved=getSaved();
  bottles=saved.length?saved:[{id:1,sizeMl:2000}];
  if(!saved.length)saveBts();
  document.getElementById('stage').innerHTML='';
  const b=bottles[current];
  document.getElementById('stage').innerHTML=makeCardHTML(b,current);
  wireCard(b,current);
  const ml=getMl(b.id);
  makeSim(b.id,ml); startRaf(b.id); renderUI(b.id,ml);
  renderDots();
}

let tt;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2400);}

function flashNFC(uid){
  const svg=document.getElementById('svg-'+uid); if(!svg)return;
  // Bottle glow
  svg.classList.remove('nfc-glow');
  void svg.offsetWidth;
  svg.classList.add('nfc-glow');
  svg.addEventListener('animationend',()=>svg.classList.remove('nfc-glow'),{once:true});
  // Screen flash
  const sf=document.getElementById('nfc-screen-flash');
  if(sf){
    sf.style.animation='none';
    void sf.offsetWidth;
    sf.style.animation='screen-flash 1.4s ease-out forwards';
  }
  // Haptic (mobile)
  if(navigator.vibrate) navigator.vibrate([30,20,60]);
}

// ── Tab heartbeat: mark this tab as alive every 3s ──────
const TAB_KEY = 'awa-tab-alive';
const TAB_ID  = Date.now() + Math.random();
function heartbeat(){
  localStorage.setItem(TAB_KEY, JSON.stringify({id:TAB_ID, ts:Date.now()}));
}
heartbeat();
setInterval(heartbeat, 3000);
window.addEventListener('focus', heartbeat);
// Clear on unload
window.addEventListener('beforeunload',()=>{
  const alive = JSON.parse(localStorage.getItem(TAB_KEY)||'{}');
  if(alive.id === TAB_ID) localStorage.removeItem(TAB_KEY);
});

function isMainTabAlive(){
  const alive = JSON.parse(localStorage.getItem(TAB_KEY)||'{}');
  if(!alive.ts) return false;
  // Consider alive if heartbeat < 6s ago AND it's not us
  return (Date.now() - alive.ts < 6000) && (alive.id !== TAB_ID);
}

function handleURL(){
  const p=new URLSearchParams(location.search);
  if(p.get('action')==='drink'){
    history.replaceState({},'',location.pathname);

    // Check if another AwA tab is already open and alive
    if(isMainTabAlive()){
      // Yes — broadcast and close this tab
      const bc = new BroadcastChannel('awa-nfc');
      bc.postMessage({type:'DRINK', bottle: p.get('bottle')||'1'});
      bc.close();

      // Show quick confirmation then close
      document.body.innerHTML=`
        <div style="display:flex;align-items:center;justify-content:center;
          height:100dvh;background:#080c14;
          font-family:-apple-system,sans-serif;flex-direction:column;gap:14px;">
          <svg width="44" height="54" viewBox="0 0 24 28" fill="#0a84ff">
            <path d="M12 1C12 1 3 11 3 17a9 9 0 0018 0C21 11 12 1 12 1z"/>
          </svg>
          <span style="font-size:17px;font-weight:600;color:#fff;letter-spacing:-.02em">+50 ML</span>
          <span style="font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.12em">REGISTRADO</span>
        </div>`;
      setTimeout(()=>window.close(), 900);
    } else {
      // No other tab alive — handle here normally, stay open
      const b=bottles[current];
      if(b) flashNFC(b.id);
      addMl(current, ML_PER_DRINK);
    }
  }
}

// Listen for NFC drink from another tab
const _bc = new BroadcastChannel('awa-nfc');
_bc.onmessage = e => {
  if(e.data?.type==='DRINK'){
    heartbeat(); // refresh our heartbeat
    const b=bottles[current];
    if(b) flashNFC(b.id);
    addMl(current, ML_PER_DRINK);
    window.focus();
  }
};

function schedReset(){
  const now=new Date();
  setTimeout(()=>{
    bottles.forEach(b=>{setMl(b.id,0);renderUI(b.id,0);if(sims[b.id]){sims[b.id].ml=0;sims[b.id].targetY=FLOOR;}});
    schedReset();
  },new Date(now.getFullYear(),now.getMonth(),now.getDate()+1)-now);
}

/* ════════════════════════════════════════
   STATS
════════════════════════════════════════ */
const DAYS = ['L','M','X','J','V','S','D'];

function getWeekKey(date, id){
  // localStorage key for a given date and bottle id
  return `awa-b${id}-${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
}

function getMondayOfWeek(){
  const d=new Date();
  const day=d.getDay(); // 0=Sun
  const diff=day===0?-6:1-day;
  const mon=new Date(d);
  mon.setDate(d.getDate()+diff);
  mon.setHours(0,0,0,0);
  return mon;
}

function getDayMl(date){
  // Sum across all bottles
  const ml = bottles.reduce((sum,b)=>{
    const k=`awa-b${b.id}-${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
    return sum + parseInt(localStorage.getItem(k)||'0');
  },0);
  return ml;
}

function calcStreak(){
  let streak=0;
  const d=new Date(); d.setHours(0,0,0,0);
  // Don't penalize for today not being done yet
  for(let i=0;i<365;i++){
    const check=new Date(d); check.setDate(d.getDate()-i);
    const ml=getDayMl(check);
    if(i===0 && ml===0) continue; // today not done yet — skip
    if(ml>=BOTTLE_GOAL) streak++;
    else if(i>0) break;
  }
  return streak;
}

function calcBestWeek(){
  // Scan last 12 weeks
  let best=0;
  for(let w=0;w<12;w++){
    const mon=getMondayOfWeek();
    mon.setDate(mon.getDate()-w*7);
    let total=0;
    for(let d=0;d<7;d++){
      const day=new Date(mon); day.setDate(mon.getDate()+d);
      total+=getDayMl(day);
    }
    if(total>best) best=total;
  }
  return best;
}

function renderStats(){
  const mon=getMondayOfWeek();
  const today=new Date(); today.setHours(0,0,0,0);
  const grid=document.getElementById('weekGrid'); if(!grid)return;
  grid.innerHTML='';

  for(let d=0;d<7;d++){
    const day=new Date(mon); day.setDate(mon.getDate()+d);
    const ml=getDayMl(day);
    const pct=Math.min(ml/BOTTLE_GOAL,1);
    const isToday=day.getTime()===today.getTime();
    const isFuture=day>today;

    // SVG ring
    const R=16, CIRC=2*Math.PI*R;
    const offset=CIRC*(1-pct);
    const colorClass=pct>=1?'done':pct>0?'partial':'empty';

    const cell=document.createElement('div');
    cell.className='day-cell'+(isToday?' today':'');
    cell.innerHTML=`
      <div class="day-ring${isToday?' today':''}">
        <svg viewBox="0 0 40 40">
          <circle class="ring-bg" cx="20" cy="20" r="${R}" fill="none" stroke-width="4"/>
          <circle class="ring-fill ${colorClass}" cx="20" cy="20" r="${R}" fill="none" stroke-width="4"
            stroke-dasharray="${CIRC}" stroke-dashoffset="${isFuture?CIRC:offset}"/>
        </svg>
        <div class="ring-label">${isFuture?'':ml>=1000?(ml/1000).toFixed(1)+'L':ml>0?ml+'':''}</div>
      </div>
      <div class="day-name">${DAYS[d]}</div>`;
    grid.appendChild(cell);
  }

  document.getElementById('streakNum').textContent=calcStreak();

  // Avg last 7 days
  let avg7=0;
  for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);avg7+=getDayMl(d);}
  const avgEl=document.getElementById('avgWeek');
  if(avgEl) avgEl.textContent=(avg7/7/1000).toFixed(2);

  // Total historic (last 365 days)
  let total=0;
  for(let i=0;i<365;i++){const d=new Date();d.setDate(d.getDate()-i);total+=getDayMl(d);}
  const totEl=document.getElementById('totalHist');
  if(totEl) totEl.textContent=(total/1000).toFixed(1);

  // Days completed this week
  let doneDays=0;
  for(let d=0;d<7;d++){const day=new Date(mon);day.setDate(mon.getDate()+d);if(getDayMl(day)>=BOTTLE_GOAL)doneDays++;}
  const wkEl=document.getElementById('weekPct');
  if(wkEl) wkEl.textContent=`${doneDays} / 7`;

  // Peak hours — top 3
  const peakList=document.getElementById('peakList');
  if(peakList){
    const hours=JSON.parse(localStorage.getItem('awa-hours')||'{}');
    const entries=Object.entries(hours).map(([h,c])=>({h:parseInt(h),c}));
    entries.sort((a,b)=>b.c-a.c);
    const top3=entries.slice(0,3);
    if(top3.length===0){
      peakList.innerHTML='<div class="peak-empty">Aún sin datos</div>';
    } else {
      const maxC=top3[0].c;
      function fmt(h){
        const ampm=h<12?'AM':'PM';
        const h12=h%12||12;
        return `${h12}:00 ${ampm}`;
      }
      peakList.innerHTML=top3.map((e,i)=>{
        const pct=Math.round((e.c/maxC)*100);
        const rank=['#1','#2','#3'][i];
        return `<div class="peak-row">
          <div class="peak-row-top">
            <span class="peak-hour">${rank} — ${fmt(e.h)}</span>
            <span class="peak-pct">${pct}%</span>
          </div>
          <div class="peak-bar-track">
            <div class="peak-bar-fill" style="width:0%" data-pct="${pct}"></div>
          </div>
        </div>`;
      }).join('');
      // Animate bars in
      requestAnimationFrame(()=>{
        peakList.querySelectorAll('.peak-bar-fill').forEach(el=>{
          el.style.width=el.dataset.pct+'%';
        });
      });
    }
  }
}

// Re-render stats when scrolling to it
document.getElementById('appScroll')?.addEventListener('scroll',()=>{
  const scroll=document.getElementById('appScroll');
  if(scroll.scrollTop > window.innerHeight*0.4) renderStats();
},{passive:true});

// Register Service Worker (prevents NFC from opening new tab)
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
  // Listen for NFC messages from SW
  navigator.serviceWorker.addEventListener('message', e => {
    if(e.data?.type === 'NFC_DRINK'){
      const b = bottles[current]; if(!b) return;
      flashNFC(b.id);
      setTimeout(()=>addMl(current, ML_PER_DRINK), 200);
    }
  });
}

initStage();handleURL();schedReset();initTilt();
setTimeout(renderStats,500);
</script>
