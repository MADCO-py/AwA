<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>AwA</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080c14;--blue:#3b9eff;--blue-dim:#1a5fa8;--text-dim:rgba(255,255,255,0.35);--text-mid:rgba(255,255,255,0.65);}
html,body{width:100%;height:100%;background:var(--bg);color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
  overflow:hidden;touch-action:none;}
.stage{width:100%;height:100dvh;position:relative;overflow:hidden;}
.bottle-card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px;}

.slide-out-left{animation:soleft .6s cubic-bezier(.4,0,.2,1) forwards;}
.slide-in-right{animation:siright .6s cubic-bezier(.34,1.2,.64,1) forwards;}
@keyframes soleft{0%{transform:translateX(0);opacity:1}100%{transform:translateX(-115%);opacity:0}}
@keyframes siright{0%{transform:translateX(115%);opacity:0}60%{transform:translateX(4%);opacity:1}100%{transform:translateX(0);opacity:1}}

.dots{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:20;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.18);transition:background .3s,transform .3s;}
.dot.active{background:var(--blue);transform:scale(1.35);}

/* Bottle wrap: canvas + SVG stacked */
.bottle-wrap{
  position:relative;
  width:min(200px,50vw);
  flex-shrink:0;
}
/* Canvas fills exact same space as SVG */
.bottle-canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  display:block;
}
.bottle-svg{
  position:relative;
  width:100%;height:auto;
  display:block;
  pointer-events:none;
  /* glow applied here, but canvas clips inside so no leak */
  transition:filter .8s ease;
}
.bottle-svg.glowing{animation:gpulse 2s ease-in-out infinite;}
@keyframes gpulse{
  0%,100%{filter:drop-shadow(0 0 0px transparent)}
  50%{filter:drop-shadow(0 0 32px rgba(59,158,255,.7)) drop-shadow(0 0 80px rgba(59,158,255,.3))}
}

.counter{margin-top:20px;text-align:center;}
.lnum{font-size:clamp(48px,11vw,62px);font-weight:700;letter-spacing:-.04em;line-height:1;color:#fff;}
.lunit{font-size:clamp(18px,4.5vw,24px);font-weight:300;color:var(--text-dim);}
.mlrow{margin-top:5px;font-size:clamp(11px,2.8vw,13px);color:var(--text-dim);letter-spacing:.13em;}
.blabel{margin-top:3px;font-size:11px;color:rgba(255,255,255,.18);letter-spacing:.18em;text-transform:uppercase;}
.ptrack{margin-top:14px;width:min(200px,50vw);height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--blue-dim),var(--blue));border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1);width:0%;}
.btn-row{margin-top:16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
.btn-ghost{background:rgba(59,158,255,.06);border:.5px solid rgba(255,255,255,.09);color:var(--text-mid);font-family:inherit;font-size:13px;letter-spacing:.05em;padding:9px 18px;border-radius:100px;cursor:pointer;transition:background .2s,border-color .2s,color .2s,transform .12s;}
.btn-ghost:hover{background:rgba(59,158,255,.12);border-color:rgba(59,158,255,.28);color:#fff;}
.btn-ghost:active{transform:scale(.94);}
.btn-ghost:disabled{opacity:.2;pointer-events:none;}
.btn-add{background:linear-gradient(135deg,rgba(59,158,255,.16),rgba(59,158,255,.07));border:.5px solid rgba(59,158,255,.35);color:var(--blue);font-family:inherit;font-size:13px;letter-spacing:.06em;padding:10px 22px;border-radius:100px;cursor:pointer;opacity:0;pointer-events:none;transform:translateY(8px) scale(.95);transition:opacity .4s cubic-bezier(.34,1.2,.64,1),transform .4s cubic-bezier(.34,1.2,.64,1);}
.btn-add.visible{opacity:1;pointer-events:auto;transform:translateY(0) scale(1);}
.btn-add:active{transform:scale(.94);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-bg.show{opacity:1;pointer-events:auto;}
.modal{background:#0f1829;border:.5px solid rgba(255,255,255,.1);border-radius:20px;padding:32px 28px;width:min(320px,88vw);text-align:center;transform:scale(.92) translateY(16px);transition:transform .35s cubic-bezier(.34,1.2,.64,1);}
.modal-bg.show .modal{transform:scale(1) translateY(0);}
.modal h2{font-size:18px;font-weight:600;margin-bottom:8px;}
.modal p{font-size:13px;color:var(--text-dim);margin-bottom:24px;line-height:1.5;}
.modal input{width:100%;background:rgba(255,255,255,.05);border:.5px solid rgba(255,255,255,.12);color:#fff;font-family:inherit;font-size:20px;text-align:center;padding:14px;border-radius:12px;outline:none;margin-bottom:20px;transition:border-color .2s;}
.modal input:focus{border-color:rgba(59,158,255,.5);}
.btn-confirm{width:100%;background:var(--blue);color:#fff;border:none;font-family:inherit;font-size:15px;font-weight:600;padding:14px;border-radius:12px;cursor:pointer;transition:opacity .2s,transform .12s;}
.btn-confirm:hover{opacity:.88;}.btn-confirm:active{transform:scale(.98);}
.toast{position:fixed;bottom:46px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(13,20,36,.9);border:.5px solid rgba(59,158,255,.22);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:rgba(255,255,255,.85);font-size:13px;letter-spacing:.06em;padding:10px 24px;border-radius:100px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;z-index:50;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.complete-bar{position:fixed;top:0;left:0;right:0;text-align:center;padding:14px;font-size:10px;letter-spacing:.2em;color:var(--blue);opacity:0;transition:opacity .8s;pointer-events:none;z-index:30;}
.complete-bar.show{opacity:1;}
</style>
</head>
<body>
<div class="stage" id="stage"></div>
<div class="dots" id="dots"></div>
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>Nueva botella</h2>
    <p>Tamaño en mililitros</p>
    <input type="number" id="sizeInput" placeholder="1000" min="100" max="3000" inputmode="numeric"/>
    <button class="btn-confirm" id="btnConfirm">Agregar</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="complete-bar" id="completeBar">BOTELLA COMPLETA</div>

<script>
/* ═══════════════════════════════════
   CONFIG
═══════════════════════════════════ */
const ML_PER_DRINK   = 50;
const BOTTLE_GOAL    = 1000;
const MAX_BOTTLES    = 3;
const ML_PER_PARTICLE = 10;

/* ═══════════════════════════════════
   BOTTLE SHAPE in canvas coords
   Canvas is 200×520 px (same as SVG viewBox)
   We define the inner clip path here
   so particles are masked inside it.
═══════════════════════════════════ */
const CW = 200, CH = 520;  // canvas logical size

// Build the bottle inner path as a Path2D
// This matches the SVG body path exactly
function makeBottlePath(){
  const p = new Path2D();
  p.moveTo(88,0);
  p.lineTo(88,10);
  p.bezierCurveTo(88,10, 82,12, 79,16);
  p.lineTo(75,24);
  p.lineTo(75,34);
  p.bezierCurveTo(58,40, 38,62, 34,92);
  p.lineTo(30,126);
  p.bezierCurveTo(28,138, 27,150, 27,162);
  p.lineTo(27,400);
  p.bezierCurveTo(27,438, 60,468, 100,468);
  p.bezierCurveTo(140,468, 173,438, 173,400);
  p.lineTo(173,162);
  p.bezierCurveTo(173,150, 172,138, 170,126);
  p.lineTo(166,92);
  p.bezierCurveTo(162,62, 142,40, 125,34);
  p.lineTo(125,24);
  p.lineTo(121,16);
  p.bezierCurveTo(118,12, 112,10, 112,10);
  p.lineTo(112,0);
  p.closePath();
  return p;
}

// Wall x range at given y for physics (sampled from bottle shape)
function wallAt(y){
  if(y < 15)  return {l:85,  r:115};
  if(y < 30)  return {l:77,  r:123};
  if(y < 60)  return {l:68,  r:132};
  if(y < 95)  return {l:40,  r:160};
  if(y < 130) return {l:30,  r:170};
  if(y < 400) return {l:28,  r:172};
  if(y < 460) {
    const t=(y-400)/60;
    return {l:28+t*14, r:172-t*14};
  }
  return {l:42, r:158};
}
const FLOOR = 458;
const CEIL  = 18;

/* ═══════════════════════════════════
   PHYSICS
═══════════════════════════════════ */
let gx=0, gy=1;  // gravity vector (screen space)

const sims = {}; // uid -> {particles, rafId}

function makeSim(uid, currentMl){
  if(sims[uid]?.rafId) cancelAnimationFrame(sims[uid].rafId);
  const n = Math.round(currentMl / ML_PER_PARTICLE);
  const particles = [];
  for(let i=0;i<n;i++){
    const y = FLOOR - 8 - Math.random()*Math.min(n*4, 300);
    const w = wallAt(y);
    const cx = (w.l+w.r)/2;
    particles.push({
      x: cx+(Math.random()-.5)*(w.r-w.l)*0.6,
      y,
      vx:(Math.random()-.5)*.5,
      vy: Math.random()*.3,
      r: 7+Math.random()*3
    });
  }
  sims[uid]={particles, rafId:null};
}

function spawnDrops(uid, count){
  const sim=sims[uid]; if(!sim)return;
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      sim.particles.push({
        x: 90+(Math.random()-0.5)*20,
        y: CEIL+5+Math.random()*8,
        vx:(Math.random()-.5)*3,
        vy: 1+Math.random()*2,
        r: 7+Math.random()*3
      });
    }, i*55);
  }
}

function stepSim(uid){
  const sim=sims[uid]; if(!sim)return;
  const P=sim.particles;
  const N=P.length;
  const GRAV=0.5, DAMP=0.68, FRIC=0.86, REP=0.4;

  for(let i=0;i<N;i++){
    const p=P[i];
    p.vx += gx*GRAV;
    p.vy += gy*GRAV;
    p.x  += p.vx;
    p.y  += p.vy;

    // floor
    if(p.y+p.r>FLOOR){ p.y=FLOOR-p.r; p.vy*=-DAMP; p.vx*=FRIC; }
    // ceiling
    if(p.y-p.r<CEIL){ p.y=CEIL+p.r; p.vy*=-DAMP; }
    // walls
    const w=wallAt(p.y);
    if(p.x-p.r<w.l){ p.x=w.l+p.r; p.vx*=-DAMP; }
    if(p.x+p.r>w.r){ p.x=w.r-p.r; p.vx*=-DAMP; }
    // speed cap
    const s=Math.hypot(p.vx,p.vy);
    if(s>14){p.vx=p.vx/s*14;p.vy=p.vy/s*14;}
  }

  // repulsion between particles
  for(let i=0;i<N;i++){
    for(let j=i+1;j<N;j++){
      const a=P[i],b=P[j];
      const dx=b.x-a.x, dy=b.y-a.y;
      const d=Math.hypot(dx,dy);
      const min=a.r+b.r-1;
      if(d<min&&d>0.01){
        const ov=(min-d)/d*REP;
        a.vx-=dx*ov; a.vy-=dy*ov;
        b.vx+=dx*ov; b.vy+=dy*ov;
      }
    }
  }
}

/* ═══════════════════════════════════
   RENDER — canvas clips particles
   to bottle shape using Path2D
═══════════════════════════════════ */
const bottlePath = makeBottlePath();

function renderSim(uid){
  const sim=sims[uid]; if(!sim)return;
  const cvs=document.getElementById(`wc-${uid}`); if(!cvs)return;
  const ctx=cvs.getContext('2d');

  // Scale canvas to actual display size
  const displayW=cvs.offsetWidth, displayH=cvs.offsetHeight;
  if(cvs.width!==displayW||cvs.height!==displayH){
    cvs.width=displayW; cvs.height=displayH;
  }
  const scaleX=displayW/CW, scaleY=displayH/CH;

  ctx.clearRect(0,0,cvs.width,cvs.height);

  const P=sim.particles;
  if(P.length===0) return;

  ctx.save();
  // Scale to match SVG viewBox
  ctx.scale(scaleX, scaleY);

  // ── CLIP to bottle shape ──────────
  ctx.beginPath();
  ctx.moveTo(88,0);
  ctx.bezierCurveTo(88,10, 82,12, 79,16);
  ctx.lineTo(79,16); ctx.lineTo(75,24); ctx.lineTo(75,34);
  ctx.bezierCurveTo(58,40, 38,62, 34,92);
  ctx.lineTo(30,126);
  ctx.bezierCurveTo(28,138, 27,150, 27,162);
  ctx.lineTo(27,400);
  ctx.bezierCurveTo(27,438, 60,468, 100,468);
  ctx.bezierCurveTo(140,468, 173,438, 173,400);
  ctx.lineTo(173,162);
  ctx.bezierCurveTo(173,150, 172,138, 170,126);
  ctx.lineTo(166,92);
  ctx.bezierCurveTo(162,62, 142,40, 125,34);
  ctx.lineTo(125,24); ctx.lineTo(121,16);
  ctx.bezierCurveTo(118,12, 112,10, 112,10);
  ctx.lineTo(112,0);
  ctx.closePath();
  ctx.clip();

  // ── dark bottle interior bg ───────
  ctx.fillStyle='#0b1628';
  ctx.fillRect(0,0,CW,CH);

  // ── draw particles ────────────────
  for(const p of P){
    // outer glow / blob
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*1.8);
    g.addColorStop(0,   'rgba(79,170,255,1)');
    g.addColorStop(0.45,'rgba(40,120,220,0.85)');
    g.addColorStop(1,   'rgba(10,60,160,0)');
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*1.8,0,Math.PI*2);
    ctx.fillStyle=g;
    ctx.fill();
  }

  // solid cores — makes them look like actual drops
  for(const p of P){
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*.75,0,Math.PI*2);
    ctx.fillStyle='rgba(100,190,255,0.65)';
    ctx.fill();
  }

  // glint highlights
  for(const p of P){
    ctx.beginPath();
    ctx.arc(p.x-p.r*.28,p.y-p.r*.28,p.r*.2,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.fill();
  }

  ctx.restore();
}

function startRaf(uid){
  const sim=sims[uid]; if(!sim)return;
  function frame(){
    stepSim(uid);
    renderSim(uid);
    sim.rafId=requestAnimationFrame(frame);
  }
  if(sim.rafId) cancelAnimationFrame(sim.rafId);
  sim.rafId=requestAnimationFrame(frame);
}

/* ═══════════════════════════════════
   DEVICE MOTION
═══════════════════════════════════ */
function initTilt(){
  function onMotion(e){
    const a=e.accelerationIncludingGravity; if(!a||a.x==null)return;
    gx=Math.max(-2,Math.min(2,  a.x/9.8));
    gy=Math.max(-2,Math.min(2, -a.y/9.8));
  }
  if(window.DeviceMotionEvent){
    if(typeof DeviceMotionEvent.requestPermission==='function'){
      document.addEventListener('click',function ask(){
        DeviceMotionEvent.requestPermission().then(r=>{if(r==='granted')window.addEventListener('devicemotion',onMotion);}).catch(()=>{});
        document.removeEventListener('click',ask);
      },{once:true});
    } else {
      window.addEventListener('devicemotion',onMotion);
    }
  }
  // desktop: mouse tilt
  window.addEventListener('mousemove',e=>{
    gx=((e.clientX-window.innerWidth/2)/(window.innerWidth/2))*1.4;
  });
  // desktop: dblclick shake
  window.addEventListener('dblclick',()=>{
    Object.values(sims).forEach(s=>s.particles.forEach(p=>{p.vx+=(Math.random()-.5)*18;p.vy+=(Math.random()-.5)*18;}));
  });
}

/* ═══════════════════════════════════
   SVG SHELL (transparent body bg,
   cap, highlights drawn on top of canvas)
═══════════════════════════════════ */
function makeBottleSVG(uid){
  return `
<canvas class="bottle-canvas" id="wc-${uid}"></canvas>
<svg class="bottle-svg" id="svg-${uid}" viewBox="0 0 200 520" xmlns="http://www.w3.org/2000/svg">
  <!-- NO fill on body — canvas underneath shows through -->
  <!-- outline only -->
  <path d="M88,0 L88,10 C88,10 82,12 79,16 L75,24 L75,34 C58,40 38,62 34,92 L30,126 C28,138 27,150 27,162 L27,400 C27,438 60,468 100,468 C140,468 173,438 173,400 L173,162 C173,150 172,138 170,126 L166,92 C162,62 142,40 125,34 L125,24 L121,16 C118,12 112,10 112,10 L112,0 Z"
    fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>

  <!-- glass highlight left edge (decorative, on top) -->
  <path d="M34,170 Q28,285 32,395" stroke="rgba(255,255,255,0.07)" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M37,178 Q32,285 35,388" stroke="rgba(255,255,255,0.18)" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- upper glass glare -->
  <path d="M88,0 L88,10 C88,10 82,12 79,16 L75,24 L75,34 C58,40 38,62 34,92 L30,126 C28,138 27,150 27,162 L27,270 C55,262 74,258 88,258 L112,258 C126,258 145,262 173,270 L173,162 C173,150 172,138 170,126 L166,92 C162,62 142,40 125,34 L125,24 L121,16 C118,12 112,10 112,10 L112,0 Z"
    fill="rgba(255,255,255,0.028)"/>

  <!-- CAP (solid, covers top of canvas) -->
  <rect x="74" y="0" width="52" height="14" rx="5" fill="#111d38"/>
  <rect x="74" y="0" width="52" height="14" rx="5" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width=".5"/>
  <rect x="70" y="12" width="60" height="22" rx="4" fill="#0e1a30"/>
  <rect x="70" y="12" width="60" height="22" rx="4" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width=".5"/>
  <rect x="62" y="30" width="76" height="50" rx="10" fill="#131f3c"/>
  <rect x="62" y="30" width="76" height="50" rx="10" fill="rgba(255,255,255,0.025)"/>
  <rect x="62" y="30" width="76" height="50" rx="10" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width=".5"/>
  <rect x="74" y="26" width="52" height="12" rx="5" fill="#1c3060"/>
  <rect x="84" y="30" width="32" height="6" rx="3" fill="rgba(59,158,255,0.22)"/>
  <ellipse cx="100" cy="30" rx="16" ry="5" fill="#080f1e"/>
  <ellipse cx="100" cy="30" rx="8" ry="3" fill="#050a14"/>
  <path d="M132,36 C152,36 164,46 164,62 C164,74 155,80 140,80" fill="none" stroke="#182848" stroke-width="9" stroke-linecap="round"/>
  <path d="M132,36 C152,36 164,46 164,62 C164,74 155,80 140,80" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width=".8" stroke-linecap="round"/>
  <path d="M67,34 Q100,40 133,34" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none" stroke-linecap="round"/>
  <text x="100" y="60" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="7" font-weight="600" fill="rgba(255,255,255,0.16)" letter-spacing="2.5">OWALA</text>
  <line x1="63" y1="78" x2="137" y2="78" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>

  <!-- base shadow -->
  <ellipse cx="100" cy="464" rx="42" ry="5" fill="rgba(0,0,0,0.25)"/>
  <!-- outer drop shadow on whole bottle -->
  <path d="M88,0 L88,10 C88,10 82,12 79,16 L75,24 L75,34 C58,40 38,62 34,92 L30,126 C28,138 27,150 27,162 L27,400 C27,438 60,468 100,468 C140,468 173,438 173,400 L173,162 C173,150 172,138 170,126 L166,92 C162,62 142,40 125,34 L125,24 L121,16 C118,12 112,10 112,10 L112,0 Z"
    fill="none" stroke="rgba(0,0,0,0.0)" stroke-width="0"/>
</svg>`;
}

/* ═══════════════════════════════════
   STORAGE
═══════════════════════════════════ */
function todayKey(id){const d=new Date();return`awa-b${id}-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}
function getMl(id){return parseInt(localStorage.getItem(todayKey(id))||'0');}
function setMl(id,ml){localStorage.setItem(todayKey(id),Math.max(0,ml));}
function getSaved(){return JSON.parse(localStorage.getItem('awa-bottles')||'[]');}
function saveBts(){localStorage.setItem('awa-bottles',JSON.stringify(bottles));}

let bottles=[], current=0, transitioning=false;

/* ═══════════════════════════════════
   CARD
═══════════════════════════════════ */
function makeCardHTML(b,idx){
  const uid=b.id;
  return `<div class="bottle-card" id="card-${uid}" data-idx="${idx}">
    <div class="bottle-wrap" id="bw-${uid}">${makeBottleSVG(uid)}</div>
    <div class="counter">
      <div style="display:flex;align-items:baseline;justify-content:center;gap:6px;">
        <span class="lnum" id="lnum-${uid}">0.0</span>
        <span class="lunit">L</span>
      </div>
      <div class="mlrow" id="mlrow-${uid}">0 ML / ${BOTTLE_GOAL} ML</div>
      <div class="blabel">${b.sizeMl} ML POR BOTELLA</div>
    </div>
    <div class="ptrack"><div class="pfill" id="prog-${uid}"></div></div>
    <div class="btn-row">
      <button class="btn-ghost" id="undo-${uid}" disabled>- ${ML_PER_DRINK} ML</button>
      <button class="btn-ghost" id="add50-${uid}">+ ${ML_PER_DRINK} ML</button>
      <button class="btn-add"   id="addbottle-${uid}">+ Botella</button>
    </div>
  </div>`;
}

/* ═══════════════════════════════════
   RENDER UI
═══════════════════════════════════ */
function renderUI(uid, ml){
  const frac=Math.min(ml/BOTTLE_GOAL,1);
  const lnum=document.getElementById(`lnum-${uid}`); if(!lnum)return;
  lnum.textContent=(ml/1000).toFixed(1);
  document.getElementById(`mlrow-${uid}`).textContent=`${ml} ML / ${BOTTLE_GOAL} ML`;
  document.getElementById(`prog-${uid}`).style.width=`${frac*100}%`;
  document.getElementById(`undo-${uid}`).disabled=ml===0;
  const svg=document.getElementById(`svg-${uid}`);
  const addB=document.getElementById(`addbottle-${uid}`);
  const bar=document.getElementById('completeBar');
  if(ml>=BOTTLE_GOAL){
    svg?.classList.add('glowing');
    bar.classList.add('show');
    if(addB&&bottles.length<MAX_BOTTLES) addB.classList.add('visible');
  } else {
    svg?.classList.remove('glowing');
    bar.classList.remove('show');
    addB?.classList.remove('visible');
  }
}

/* ═══════════════════════════════════
   DOTS
═══════════════════════════════════ */
function renderDots(){
  document.getElementById('dots').innerHTML=
    bottles.map((_,i)=>`<div class="dot${i===current?' active':''}"></div>`).join('');
}

/* ═══════════════════════════════════
   DRINK / UNDO
═══════════════════════════════════ */
function addMl(idx,amount){
  const b=bottles[idx]; if(!b)return;
  let ml=getMl(b.id);
  if(ml>=BOTTLE_GOAL){showToast('Botella completa');return;}
  ml=Math.min(BOTTLE_GOAL,ml+amount);
  setMl(b.id,ml); renderUI(b.id,ml);
  spawnDrops(b.id, Math.round(amount/ML_PER_PARTICLE));
  if(ml>=BOTTLE_GOAL) setTimeout(()=>showToast('Botella llena — agrega la siguiente'),700);
}
function removeMl(idx){
  const b=bottles[idx]; if(!b)return;
  let ml=getMl(b.id); if(ml<=0)return;
  const prev=ml;
  ml=Math.max(0,ml-ML_PER_DRINK);
  setMl(b.id,ml); renderUI(b.id,ml);
  const sim=sims[b.id];
  if(sim){const n=Math.round((prev-ml)/ML_PER_PARTICLE);sim.particles.splice(-n,n);}
  showToast(`-${ML_PER_DRINK} ML`);
}

/* ═══════════════════════════════════
   ADD BOTTLE
═══════════════════════════════════ */
function openModal(){document.getElementById('sizeInput').value='1000';document.getElementById('modalBg').classList.add('show');setTimeout(()=>document.getElementById('sizeInput').focus(),350);}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
function confirmAdd(){
  const val=parseInt(document.getElementById('sizeInput').value);
  if(!val||val<50||val>5000){showToast('Tamaño inválido');return;}
  closeModal();addBottle(val);
}
function addBottle(sizeMl){
  if(transitioning||bottles.length>=MAX_BOTTLES)return;
  transitioning=true;
  const nb={id:Date.now(),sizeMl};
  bottles.push(nb);saveBts();
  const stage=document.getElementById('stage');
  const oldCard=stage.querySelector('.bottle-card');
  const tmp=document.createElement('div');
  tmp.innerHTML=makeCardHTML(nb,bottles.length-1);
  const newCard=tmp.firstChild;
  stage.appendChild(newCard);
  makeSim(nb.id,0);
  startRaf(nb.id);
  renderUI(nb.id,0);
  wireCard(nb,bottles.length-1);
  requestAnimationFrame(()=>{
    if(oldCard){oldCard.classList.add('slide-out-left');oldCard.addEventListener('animationend',()=>oldCard.remove(),{once:true});}
    newCard.classList.add('slide-in-right');
    newCard.addEventListener('animationend',()=>{newCard.classList.remove('slide-in-right');current=bottles.length-1;renderDots();transitioning=false;},{once:true});
  });
}
function wireCard(b,idx){
  document.getElementById(`undo-${b.id}`)?.addEventListener('click',()=>removeMl(idx));
  document.getElementById(`add50-${b.id}`)?.addEventListener('click',()=>addMl(idx,ML_PER_DRINK));
  document.getElementById(`addbottle-${b.id}`)?.addEventListener('click',openModal);
}

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
function initStage(){
  const saved=getSaved();
  bottles=saved.length?saved:[{id:1,sizeMl:1000}];
  if(!saved.length)saveBts();
  document.getElementById('stage').innerHTML='';
  const b=bottles[current];
  document.getElementById('stage').innerHTML=makeCardHTML(b,current);
  wireCard(b,current);
  const ml=getMl(b.id);
  makeSim(b.id,ml);
  startRaf(b.id);
  renderUI(b.id,ml);
  renderDots();
}

/* ═══════════════════════════════════
   TOAST / URL / RESET
═══════════════════════════════════ */
let tt;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2600);}
function handleURL(){
  const p=new URLSearchParams(location.search);
  if(p.get('action')==='drink'){history.replaceState({},'',location.pathname);const idx=Math.min((parseInt(p.get('bottle')||'1')-1),bottles.length-1);setTimeout(()=>addMl(idx,ML_PER_DRINK),500);}
}
function schedReset(){
  const now=new Date();
  setTimeout(()=>{bottles.forEach(b=>{setMl(b.id,0);renderUI(b.id,0);if(sims[b.id])sims[b.id].particles=[];});schedReset();},new Date(now.getFullYear(),now.getMonth(),now.getDate()+1)-now);
}

document.getElementById('btnConfirm').addEventListener('click',confirmAdd);
document.getElementById('sizeInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAdd();});
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===document.getElementById('modalBg'))closeModal();});

initStage();handleURL();schedReset();initTilt();
</script>
</body>
</html>
