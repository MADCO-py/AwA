<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>AwA</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080c14;--blue:#3b9eff;--blue-dim:#1a5fa8;--text-dim:rgba(255,255,255,0.35);--text-mid:rgba(255,255,255,0.65);}
html,body{width:100%;height:100%;background:var(--bg);color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
  overflow:hidden;touch-action:none;}
.stage{width:100%;height:100dvh;position:relative;overflow:hidden;}
.bottle-card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px;}

.slide-out-left{animation:soleft .6s cubic-bezier(.4,0,.2,1) forwards;}
.slide-in-right{animation:siright .6s cubic-bezier(.34,1.2,.64,1) forwards;}
@keyframes soleft{0%{transform:translateX(0);opacity:1}100%{transform:translateX(-115%);opacity:0}}
@keyframes siright{0%{transform:translateX(115%);opacity:0}60%{transform:translateX(4%);opacity:1}100%{transform:translateX(0);opacity:1}}

.dots{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:20;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.18);transition:background .3s,transform .3s;}
.dot.active{background:var(--blue);transform:scale(1.35);}

/* Bottle wrap: canvas + SVG stacked */
.bottle-wrap{
  position:relative;
  width:min(200px,50vw);
  flex-shrink:0;
}
/* Canvas fills exact same space as SVG */
.bottle-canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  display:block;
}
.bottle-svg{
  position:relative;
  width:100%;height:auto;
  display:block;
  pointer-events:none;
  /* glow applied here, but canvas clips inside so no leak */
  transition:filter .8s ease;
}
.bottle-svg.glowing{animation:gpulse 2s ease-in-out infinite;}
@keyframes gpulse{
  0%,100%{filter:drop-shadow(0 0 0px transparent)}
  50%{filter:drop-shadow(0 0 32px rgba(59,158,255,.7)) drop-shadow(0 0 80px rgba(59,158,255,.3))}
}

.counter{margin-top:20px;text-align:center;}
.lnum{font-size:clamp(48px,11vw,62px);font-weight:700;letter-spacing:-.04em;line-height:1;color:#fff;}
.lunit{font-size:clamp(18px,4.5vw,24px);font-weight:300;color:var(--text-dim);}
.mlrow{margin-top:5px;font-size:clamp(11px,2.8vw,13px);color:var(--text-dim);letter-spacing:.13em;}
.blabel{margin-top:3px;font-size:11px;color:rgba(255,255,255,.18);letter-spacing:.18em;text-transform:uppercase;}
.ptrack{margin-top:14px;width:min(200px,50vw);height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--blue-dim),var(--blue));border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1);width:0%;}
.btn-row{margin-top:20px;display:flex;gap:12px;align-items:center;justify-content:center;}
/* ±50ml buttons — two big pill icons */
.btn-ml{
  position:relative;width:64px;height:64px;border-radius:50%;border:none;
  cursor:pointer;font-family:inherit;font-weight:700;font-size:11px;
  letter-spacing:.06em;color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  transition:transform .15s cubic-bezier(.34,1.4,.64,1),opacity .2s;
}
.btn-ml:active{transform:scale(.88);}
.btn-ml:disabled{opacity:.2;pointer-events:none;}
.btn-minus{background:linear-gradient(145deg,#0d2246,#0a1830);box-shadow:0 0 0 1px rgba(255,255,255,.08),0 8px 24px rgba(0,0,0,.5);}
.btn-plus{background:linear-gradient(145deg,#1a5fa8,#0f3d7a);box-shadow:0 0 0 1px rgba(59,158,255,.25),0 8px 24px rgba(10,60,160,.5);}
.btn-ml-icon{font-size:20px;font-weight:300;line-height:1;}
.btn-ml-label{font-size:9px;opacity:.65;letter-spacing:.1em;}
.btn-add{
  background:linear-gradient(135deg,rgba(59,158,255,.14),rgba(59,158,255,.06));
  border:.5px solid rgba(59,158,255,.3);color:var(--blue);
  font-family:inherit;font-size:12px;letter-spacing:.08em;
  padding:10px 20px;border-radius:100px;cursor:pointer;
  opacity:0;pointer-events:none;
  transform:translateY(8px) scale(.95);
  transition:opacity .4s cubic-bezier(.34,1.2,.64,1),transform .4s cubic-bezier(.34,1.2,.64,1);
}
.btn-add.visible{opacity:1;pointer-events:auto;transform:translateY(0) scale(1);}
.btn-add:active{transform:scale(.94);}

.toast{position:fixed;bottom:46px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(13,20,36,.9);border:.5px solid rgba(59,158,255,.22);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:rgba(255,255,255,.85);font-size:13px;letter-spacing:.06em;padding:10px 24px;border-radius:100px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;z-index:50;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.complete-bar{position:fixed;top:0;left:0;right:0;text-align:center;padding:14px;font-size:10px;letter-spacing:.2em;color:var(--blue);opacity:0;transition:opacity .8s;pointer-events:none;z-index:30;}
.complete-bar.show{opacity:1;}
</style>
</head>
<body>
<div class="stage" id="stage"></div>
<div class="dots" id="dots"></div>

<div class="toast" id="toast"></div>
<div class="complete-bar" id="completeBar">BOTELLA COMPLETA</div>

<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const ML_PER_DRINK = 50;
const BOTTLE_GOAL  = 1000;
const MAX_BOTTLES  = 3;

/* ═══════════════════════════════════════════
   BOTTLE GEOMETRY  (SVG viewBox 200×520)
═══════════════════════════════════════════ */
const SIM_W = 200, SIM_H = 520;
const FLOOR  = 463;  // bottom — all the way to base
const CEIL   = 90;   // top of water area (below cap)

// Returns inner wall x at given y
function wallX(y){
  if(y < 90)  return {l:34, r:166};
  if(y < 130) return {l:29, r:171};
  if(y < 400) return {l:27, r:173};
  if(y < 455) {const t=(y-400)/55; return {l:27+t*14, r:173-t*14};}
  return {l:41,r:159};
}

const BOTTLE_AREA_H = FLOOR - CEIL; // 373px

/* ═══════════════════════════════════════════
   WATER SIMULATION
   Simple but effective: track water LEVEL,
   simulate surface waves with spring physics,
   add bubble particles that float up.
   This looks WAY better than broken SPH.
═══════════════════════════════════════════ */
const sims = {};

function makeSim(uid, currentMl){
  if(sims[uid]?.rafId) cancelAnimationFrame(sims[uid].rafId);
  const fillRatio = Math.min(currentMl / BOTTLE_GOAL, 1);
  // Water level Y in sim coords (FLOOR = full, CEIL = empty)
  const targetY = FLOOR - fillRatio * BOTTLE_AREA_H;
  // Wave nodes along the surface
  const NODES = 24;
  const nodes = [];
  for(let i=0;i<=NODES;i++) nodes.push({y:targetY, vy:0});
  // Bubbles
  const bubbles = [];
  sims[uid] = {
    ml: currentMl,
    targetY,
    surfaceY: targetY,  // current mean surface
    nodes,
    bubbles,
    splashTimer: 0,
    rafId: null
  };
}

function spawnDrops(uid, mlAdded){
  // No-op — addMl handles everything directly now
}

function stepSim(uid){
  const sim = sims[uid]; if(!sim) return;
  const N = sim.nodes;
  const K = N.length;

  // Move surface toward target (fill/drain)
  sim.surfaceY += (sim.targetY - sim.surfaceY) * 0.035;

  // Spring wave simulation on surface nodes
  const SPRING = 0.04, DAMP = 0.88, SPREAD = 0.22;
  for(let i=0;i<K;i++){
    const n = N[i];
    // Spring toward mean surface
    const force = SPRING * (sim.surfaceY - n.y);
    n.vy = (n.vy + force) * DAMP;
    n.y += n.vy;
  }
  // Spread waves between neighbours
  for(let iter=0;iter<2;iter++){
    for(let i=0;i<K;i++){
      const left  = i>0   ? N[i-1].y : N[i].y;
      const right = i<K-1 ? N[i+1].y : N[i].y;
      N[i].vy += SPREAD * ((left + right)/2 - N[i].y);
    }
  }

  // gx = left/right tilt (-1=left, +1=right)
  // When tilted right: right side of bottle goes down → water surface
  // tilts: right nodes go DOWN, left nodes go UP
  const tiltAmp = gx * 35;
  for(let i=0;i<K;i++){
    const t = i/(K-1);        // 0=left edge, 1=right edge
    const targetOffset = tiltAmp * (t - 0.5);
    // Pull node toward its tilted target position
    N[i].vy += (targetOffset - (N[i].y - sim.surfaceY)) * 0.018;
  }

  // Update bubbles
  for(let i=sim.bubbles.length-1;i>=0;i--){
    const b = sim.bubbles[i];
    b.y  += b.vy;
    b.vy -= 0.012; // buoyancy (constant upward)
    b.vy *= 0.98;
    b.x  += Math.sin(b.y*0.12)*0.4; // gentle sideways drift
    b.life -= 0.008;
    // Remove if above surface or expired
    if(b.y < sim.surfaceY - 10 || b.life <= 0){
      sim.bubbles.splice(i,1);
    }
  }
}

/* ═══════════════════════════════════════════
   GRAVITY (device motion)
═══════════════════════════════════════════ */
let gx=0, gy=1;

/* ═══════════════════════════════════════════
   RENDERER
═══════════════════════════════════════════ */
function clipBottle(ctx){
  ctx.beginPath();
  ctx.moveTo(88,0);ctx.bezierCurveTo(88,10,82,12,79,16);
  ctx.lineTo(75,24);ctx.lineTo(75,34);
  ctx.bezierCurveTo(58,40,38,62,34,92);ctx.lineTo(30,126);
  ctx.bezierCurveTo(28,138,27,150,27,162);ctx.lineTo(27,400);
  ctx.bezierCurveTo(27,438,60,468,100,468);
  ctx.bezierCurveTo(140,468,173,438,173,400);ctx.lineTo(173,162);
  ctx.bezierCurveTo(173,150,172,138,170,126);ctx.lineTo(166,92);
  ctx.bezierCurveTo(162,62,142,40,125,34);
  ctx.lineTo(125,24);ctx.lineTo(121,16);
  ctx.bezierCurveTo(118,12,112,10,112,10);
  ctx.lineTo(112,0);ctx.closePath();
}

function renderSim(uid){
  const sim = sims[uid]; if(!sim)return;
  const cvs = document.getElementById(`wc-${uid}`); if(!cvs)return;
  const ctx  = cvs.getContext('2d');
  const dW   = cvs.offsetWidth, dH = cvs.offsetHeight;
  if(!dW||!dH)return;
  if(cvs.width!==dW||cvs.height!==dH){cvs.width=dW;cvs.height=dH;}

  const sx=dW/SIM_W, sy=dH/SIM_H;

  ctx.clearRect(0,0,dW,dH);

  // Dark interior
  ctx.save();
  ctx.scale(sx,sy);
  clipBottle(ctx);ctx.clip();
  ctx.fillStyle='#07101c';
  ctx.fillRect(0,0,SIM_W,SIM_H);
  ctx.restore();

  if(sim.ml <= 0) return;

  const N = sim.nodes, K = N.length;

  ctx.save();
  ctx.scale(sx,sy);
  clipBottle(ctx);ctx.clip();

  /* ── Draw water body ── */
  // Build water polygon — follows actual bottle shape at bottom
  ctx.beginPath();
  ctx.moveTo(27, FLOOR-10);
  // Bottom curve (matches bottle base)
  ctx.bezierCurveTo(27,468, 60,472, 100,472);
  ctx.bezierCurveTo(140,472, 173,468, 173,FLOOR-10);
  // Up right wall
  ctx.lineTo(173, N[K-1].y);
  // Surface right to left
  for(let i=K-1;i>=0;i--){
    const x = 27 + (i/(K-1))*(173-27);
    ctx.lineTo(x, N[i].y);
  }
  ctx.lineTo(27, N[0].y);
  ctx.closePath();

  // Water gradient
  const gy2 = ctx.createLinearGradient(0, sim.surfaceY, 0, FLOOR);
  gy2.addColorStop(0,   '#5DCFFF');
  gy2.addColorStop(0.15,'#2BAEE8');
  gy2.addColorStop(0.5, '#1488CC');
  gy2.addColorStop(1,   '#0A5099');
  ctx.fillStyle = gy2;
  ctx.fill();

  /* ── Surface shimmer line ── */
  ctx.beginPath();
  for(let i=0;i<K;i++){
    const x=27+(i/(K-1))*(173-27);
    i===0 ? ctx.moveTo(x,N[i].y) : ctx.lineTo(x,N[i].y);
  }
  ctx.strokeStyle='rgba(200,240,255,0.55)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  /* ── Top highlight (WMW style) ── */
  const hg=ctx.createLinearGradient(0,sim.surfaceY,0,sim.surfaceY+40);
  hg.addColorStop(0,'rgba(160,230,255,0.35)');
  hg.addColorStop(1,'rgba(160,230,255,0)');
  ctx.fillStyle=hg;
  ctx.beginPath();
  ctx.moveTo(27,FLOOR-10);ctx.bezierCurveTo(27,468,60,472,100,472);ctx.bezierCurveTo(140,472,173,468,173,FLOOR-10);ctx.lineTo(173,N[K-1].y);
  for(let i=K-1;i>=0;i--) ctx.lineTo(27+(i/(K-1))*(173-27),N[i].y);
  ctx.lineTo(27,N[0].y);ctx.closePath();
  ctx.fill();

  /* ── Depth darkening ── */
  const dg=ctx.createLinearGradient(0,sim.surfaceY,0,FLOOR);
  dg.addColorStop(0,'rgba(0,10,40,0)');
  dg.addColorStop(1,'rgba(0,10,40,0.3)');
  ctx.fillStyle=dg;
  ctx.beginPath();
  ctx.moveTo(27,FLOOR-10);ctx.bezierCurveTo(27,468,60,472,100,472);ctx.bezierCurveTo(140,472,173,468,173,FLOOR-10);ctx.lineTo(173,N[K-1].y);
  for(let i=K-1;i>=0;i--) ctx.lineTo(27+(i/(K-1))*(173-27),N[i].y);
  ctx.lineTo(27,N[0].y);ctx.closePath();
  ctx.fill();

  /* ── Bubbles ── */
  for(const b of sim.bubbles){
    if(b.y < sim.surfaceY) continue;
    ctx.globalAlpha = b.life * 0.65;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.strokeStyle='rgba(180,235,255,0.8)';
    ctx.lineWidth=0.8;
    ctx.stroke();
    // tiny glint
    ctx.beginPath();
    ctx.arc(b.x-b.r*0.3, b.y-b.r*0.3, b.r*0.25, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.fill();
  }
  ctx.globalAlpha=1;

  /* ── Side light reflection ── */
  ctx.fillStyle='rgba(255,255,255,0.04)';
  ctx.fillRect(27,sim.surfaceY,12,FLOOR-sim.surfaceY);

  ctx.restore();
}

function startRaf(uid){
  const sim=sims[uid]; if(!sim)return;
  function frame(){stepSim(uid);renderSim(uid);sim.rafId=requestAnimationFrame(frame);}
  if(sim.rafId)cancelAnimationFrame(sim.rafId);
  sim.rafId=requestAnimationFrame(frame);
}

/* ═══════════════════════════════════════════
   DEVICE MOTION
═══════════════════════════════════════════ */
function initTilt(){
  function onMotion(e){
    const a=e.accelerationIncludingGravity; if(!a||a.x==null)return;
    // ax: negative=tilt left, positive=tilt right (in portrait mode)
    // Normalize to -1..+1 where +1 = fully right
    gx = Math.max(-1, Math.min(1, a.x / 6));
    gy = Math.max(-1, Math.min(1, a.y / 9.8));
  }
  if(window.DeviceMotionEvent){
    if(typeof DeviceMotionEvent.requestPermission==='function'){
      document.addEventListener('click',function ask(){
        DeviceMotionEvent.requestPermission().then(r=>{if(r==='granted')window.addEventListener('devicemotion',onMotion);}).catch(()=>{});
        document.removeEventListener('click',ask);
      },{once:true});
    } else { window.addEventListener('devicemotion',onMotion); }
  }
  window.addEventListener('mousemove',e=>{
    // Mouse: moving right = tilt right
    gx = ((e.clientX-window.innerWidth/2)/(window.innerWidth/2));
  });
}

/* ═══════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════ */
function todayKey(id){const d=new Date();return`awa-b${id}-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}
function getMl(id){return parseInt(localStorage.getItem(todayKey(id))||'0');}
function setMl(id,ml){localStorage.setItem(todayKey(id),Math.max(0,ml));}
function getSaved(){return JSON.parse(localStorage.getItem('awa-bottles')||'[]');}
function saveBts(){localStorage.setItem('awa-bottles',JSON.stringify(bottles));}
let bottles=[], current=0, transitioning=false;

/* ═══════════════════════════════════════════
   SVG BOTTLE SHELL
═══════════════════════════════════════════ */
function makeBottleSVG(uid){
  return `
<canvas class="bottle-canvas" id="wc-${uid}"></canvas>
<svg class="bottle-svg" id="svg-${uid}" viewBox="0 0 200 520" xmlns="http://www.w3.org/2000/svg">
  <path d="M88,0 L88,10 C88,10 82,12 79,16 L75,24 L75,34 C58,40 38,62 34,92 L30,126 C28,138 27,150 27,162 L27,400 C27,438 60,468 100,468 C140,468 173,438 173,400 L173,162 C173,150 172,138 170,126 L166,92 C162,62 142,40 125,34 L125,24 L121,16 C118,12 112,10 112,10 L112,0 Z"
    fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
  <path d="M34,170 Q28,285 32,395" stroke="rgba(255,255,255,0.07)" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M37,178 Q32,285 35,388" stroke="rgba(255,255,255,0.18)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M88,0 L88,10 C88,10 82,12 79,16 L75,24 L75,34 C58,40 38,62 34,92 L30,126 C28,138 27,150 27,162 L27,270 C55,262 74,258 88,258 L112,258 C126,258 145,262 173,270 L173,162 C173,150 172,138 170,126 L166,92 C162,62 142,40 125,34 L125,24 L121,16 C118,12 112,10 112,10 L112,0 Z" fill="rgba(255,255,255,0.025)"/>
  <rect x="74" y="0" width="52" height="14" rx="5" fill="#111d38"/>
  <rect x="74" y="0" width="52" height="14" rx="5" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width=".5"/>
  <rect x="70" y="12" width="60" height="22" rx="4" fill="#0e1a30"/>
  <rect x="70" y="12" width="60" height="22" rx="4" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width=".5"/>
  <rect x="62" y="30" width="76" height="50" rx="10" fill="#131f3c"/>
  <rect x="62" y="30" width="76" height="50" rx="10" fill="rgba(255,255,255,0.025)"/>
  <rect x="62" y="30" width="76" height="50" rx="10" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width=".5"/>
  <rect x="74" y="26" width="52" height="12" rx="5" fill="#1c3060"/>
  <rect x="84" y="30" width="32" height="6" rx="3" fill="rgba(59,158,255,0.22)"/>
  <ellipse cx="100" cy="30" rx="16" ry="5" fill="#080f1e"/>
  <ellipse cx="100" cy="30" rx="8" ry="3" fill="#050a14"/>
  <path d="M132,36 C152,36 164,46 164,62 C164,74 155,80 140,80" fill="none" stroke="#182848" stroke-width="9" stroke-linecap="round"/>
  <path d="M132,36 C152,36 164,46 164,62 C164,74 155,80 140,80" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width=".8" stroke-linecap="round"/>
  <path d="M67,34 Q100,40 133,34" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none" stroke-linecap="round"/>
  <text x="100" y="60" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="7" font-weight="600" fill="rgba(255,255,255,0.16)" letter-spacing="2.5">OWALA</text>
  <line x1="63" y1="78" x2="137" y2="78" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>
  <ellipse cx="100" cy="464" rx="42" ry="5" fill="rgba(0,0,0,0.25)"/>
</svg>`;
}

/* ═══════════════════════════════════════════
   CARD / DOTS / UI
═══════════════════════════════════════════ */
function makeCardHTML(b,idx){
  const uid=b.id;
  return `<div class="bottle-card" id="card-${uid}" data-idx="${idx}">
    <div class="bottle-wrap" id="bw-${uid}">${makeBottleSVG(uid)}</div>
    <div class="counter">
      <div style="display:flex;align-items:baseline;justify-content:center;gap:6px;">
        <span class="lnum" id="lnum-${uid}">0.0</span>
        <span class="lunit">L</span>
      </div>
      <div class="mlrow" id="mlrow-${uid}">0 ML / ${BOTTLE_GOAL} ML</div>
      <div class="blabel">${b.sizeMl} ML POR BOTELLA</div>
    </div>
    <div class="ptrack"><div class="pfill" id="prog-${uid}"></div></div>
    <div class="btn-row">
      <button class="btn-ml btn-minus" id="undo-${uid}" disabled>
        <span class="btn-ml-icon">−</span><span class="btn-ml-label">50 ML</span>
      </button>
      <button class="btn-add" id="addbottle-${uid}">+ Botella</button>
      <button class="btn-ml btn-plus" id="add50-${uid}">
        <span class="btn-ml-icon">+</span><span class="btn-ml-label">50 ML</span>
      </button>
    </div>
  </div>`;
}

function renderDots(){
  document.getElementById('dots').innerHTML=
    bottles.map((_,i)=>`<div class="dot${i===current?' active':''}"></div>`).join('');
}

function renderUI(uid,ml){
  const frac=Math.min(ml/BOTTLE_GOAL,1);
  const lnum=document.getElementById(`lnum-${uid}`); if(!lnum)return;
  lnum.textContent=(ml/1000).toFixed(1);
  document.getElementById(`mlrow-${uid}`).textContent=`${ml} ML / ${BOTTLE_GOAL} ML`;
  document.getElementById(`prog-${uid}`).style.width=`${frac*100}%`;
  document.getElementById(`undo-${uid}`).disabled=ml===0;
  const svg=document.getElementById(`svg-${uid}`);
  const addB=document.getElementById(`addbottle-${uid}`);
  const bar=document.getElementById('completeBar');
  if(ml>=BOTTLE_GOAL){
    svg?.classList.add('glowing');bar.classList.add('show');
    if(addB&&bottles.length<MAX_BOTTLES)addB.classList.add('visible');
  } else {
    svg?.classList.remove('glowing');bar.classList.remove('show');
    addB?.classList.remove('visible');
  }
}

/* ═══════════════════════════════════════════
   DRINK / UNDO
═══════════════════════════════════════════ */
function addMl(idx,amount){
  const b=bottles[idx]; if(!b)return;
  let ml=getMl(b.id);
  if(ml>=BOTTLE_GOAL){showToast('Botella completa');return;}
  ml=Math.min(BOTTLE_GOAL,ml+amount);
  setMl(b.id,ml); renderUI(b.id,ml);
  // Sync sim.ml with reality before spawning
  const sim=sims[b.id];
  if(sim){
    sim.ml=ml;
    sim.targetY=FLOOR-(ml/BOTTLE_GOAL)*BOTTLE_AREA_H;
    // Splash nodes
    const K=sim.nodes.length, center=Math.floor(K/2);
    for(let i=0;i<K;i++){
      const dist=Math.abs(i-center);
      if(dist<6) sim.nodes[i].vy-=(6-dist)*2.5;
    }
    // Spawn bubbles
    for(let b2=0;b2<6;b2++){
      const w=wallX(FLOOR-20);
      sim.bubbles.push({
        x:w.l+10+Math.random()*(w.r-w.l-20),
        y:FLOOR-5-Math.random()*25,
        vy:-(0.4+Math.random()*0.8),
        r:1.5+Math.random()*2.5,
        life:1.0
      });
    }
  }
  if(ml>=BOTTLE_GOAL)setTimeout(()=>showToast('Botella llena — agrega la siguiente'),700);
}
function removeMl(idx){
  const b=bottles[idx]; if(!b)return;
  let ml=getMl(b.id); if(ml<=0)return;
  ml=Math.max(0,ml-ML_PER_DRINK);
  setMl(b.id,ml); renderUI(b.id,ml);
  const sim=sims[b.id];
  if(sim){ sim.ml=ml; sim.targetY=FLOOR-(ml/BOTTLE_GOAL)*BOTTLE_AREA_H; }
  showToast(`-${ML_PER_DRINK} ML`);
}

/* ═══════════════════════════════════════════
   ADD BOTTLE
═══════════════════════════════════════════ */
function addBottle(sizeMl){
  if(transitioning||bottles.length>=MAX_BOTTLES)return;
  transitioning=true;
  const nb={id:Date.now(),sizeMl};
  bottles.push(nb);saveBts();
  const stage=document.getElementById('stage');
  const oldCard=stage.querySelector('.bottle-card');
  const tmp=document.createElement('div');
  tmp.innerHTML=makeCardHTML(nb,bottles.length-1);
  const newCard=tmp.firstChild;
  stage.appendChild(newCard);
  makeSim(nb.id,0);startRaf(nb.id);renderUI(nb.id,0);
  wireCard(nb,bottles.length-1);
  requestAnimationFrame(()=>{
    if(oldCard){oldCard.classList.add('slide-out-left');oldCard.addEventListener('animationend',()=>oldCard.remove(),{once:true});}
    newCard.classList.add('slide-in-right');
    newCard.addEventListener('animationend',()=>{newCard.classList.remove('slide-in-right');current=bottles.length-1;renderDots();transitioning=false;},{once:true});
  });
}
function wireCard(b,idx){
  document.getElementById(`undo-${b.id}`)?.addEventListener('click',()=>removeMl(idx));
  document.getElementById(`add50-${b.id}`)?.addEventListener('click',()=>addMl(idx,ML_PER_DRINK));
  document.getElementById(`addbottle-${b.id}`)?.addEventListener('click',()=>addBottle(1000));
}

/* ═══════════════════════════════════════════
   INIT / TOAST / URL / RESET
═══════════════════════════════════════════ */
function initStage(){
  const saved=getSaved();
  bottles=saved.length?saved:[{id:1,sizeMl:1000}];
  if(!saved.length)saveBts();
  document.getElementById('stage').innerHTML='';
  const b=bottles[current];
  document.getElementById('stage').innerHTML=makeCardHTML(b,current);
  wireCard(b,current);
  const ml=getMl(b.id);
  makeSim(b.id,ml);startRaf(b.id);renderUI(b.id,ml);
  renderDots();
}

let tt;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2600);}

function handleURL(){
  const p=new URLSearchParams(location.search);
  if(p.get('action')==='drink'){
    history.replaceState({},'',location.pathname);
    const bParam=p.get('bottle');
    const idx=bParam?Math.min(parseInt(bParam)-1,bottles.length-1):bottles.length-1;
    setTimeout(()=>addMl(idx,ML_PER_DRINK),500);
  }
}
function schedReset(){
  const now=new Date();
  setTimeout(()=>{
    bottles.forEach(b=>{setMl(b.id,0);renderUI(b.id,0);if(sims[b.id]){sims[b.id].ml=0;sims[b.id].targetY=FLOOR;}});
    schedReset();
  },new Date(now.getFullYear(),now.getMonth(),now.getDate()+1)-now);
}

initStage();handleURL();schedReset();initTilt();
</script>
